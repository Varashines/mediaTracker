name: Build and Release DMG

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x86_64]
        include:
          - arch: arm64
            runner_arch: arm64
            output_label: "Apple Silicon"
          - arch: x86_64
            runner_arch: x86_64
            output_label: "Intel"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.3.0'

      # ✅ 1. Swift PM Build Cache Integration
      - name: Cache Swift PM Build Directory
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ matrix.arch }}-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-${{ matrix.arch }}-

      # ✅ 2. Application Bundle Compilation
      - name: Build App Bundle
        run: |
          chmod +x install.sh
          
          APP_NAME="MediaTracker"
          BUNDLE_ID="com.vara.mediatracker"
          EXECUTABLE_NAME="MediaTracker"
          ARCH="${{ matrix.arch }}"
          
          echo "🚀 Building $APP_NAME for $ARCH..."
          swift build -c release --arch $ARCH
          
          echo "🎨 Generating App Icon..."
          swift generate_icon.swift
          iconutil -c icns AppIcon.iconset -o AppIcon.icns
          
          echo "📦 Packaging into $APP_NAME.app..."
          APP_BUNDLE="$APP_NAME.app"
          CONTENTS_DIR="$APP_BUNDLE/Contents"
          MACOS_DIR="$CONTENTS_DIR/MacOS"
          RESOURCES_DIR="$CONTENTS_DIR/Resources"
          
          mkdir -p "$MACOS_DIR"
          mkdir -p "$RESOURCES_DIR"
          
          cp ".build/${ARCH}-apple-macosx/release/$EXECUTABLE_NAME" "$MACOS_DIR/"
          cp AppIcon.icns "$RESOURCES_DIR/"
          
          cat > "$CONTENTS_DIR/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>$EXECUTABLE_NAME</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon.icns</string>
              <key>CFBundleIdentifier</key>
              <string>$BUNDLE_ID</string>
              <key>CFBundleName</key>
              <string>$APP_NAME</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${GITHUB_REF_NAME#v}</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          # Ad-hoc sign (mandatory for local execution)
          codesign --force --deep --sign - "$APP_BUNDLE"

      # ✅ 3. Install create-dmg CLI via native Homebrew
      - name: Install create-dmg utility
        run: brew install create-dmg

      # ✅ 4. Package Styled Installation Window Disk Image
      # Layout parameters place the App Icon on the left and Applications link on the right
      - name: Create Styled DMG
        run: |
          ARCH="${{ matrix.arch }}"
          DMG_NAME="MediaTracker-${ARCH}"
          
          create-dmg \
            --volname "MediaTracker Installation" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "MediaTracker.app" 175 190 \
            --hide-extension "MediaTracker.app" \
            --app-drop-link 425 190 \
            "${DMG_NAME}.dmg" \
            "MediaTracker.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaTracker-${{ matrix.arch }}
          path: MediaTracker-${{ matrix.arch }}.dmg
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all DMGs
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
